server:
  port: 8080
  servlet:
    context-path: /api/selection

spring:
  application:
    name: smart-selection-system
  datasource:
    url: jdbc:mysql://localhost:3306/smart_selection?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 2

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 卖家精灵API配置
seller-sprite:
  base-url: ${SELLER_SPRITE_BASE_URL:https://api.sellersprite.com}
  api-key: ${SELLER_SPRITE_API_KEY:}
  timeout: 30000

# ERP对接配置
erp:
  base-url: ${ERP_BASE_URL:http://localhost:9090}
  api-token: ${ERP_API_TOKEN:}

logging:
  level:
    com.selection: debug
